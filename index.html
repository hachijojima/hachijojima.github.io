<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>リト｜八丈島の。</title>
  <meta name="description" content="八丈島の都市空間構造観測所。">
  <meta property="og:title" content="リト｜八丈島の。">
  <meta property="og:description" content="八丈島の都市空間構造観測所。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/66acf4cf-75be-45fc-ae56-dbfd4cc2d61a.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="/assets/66acf4cf-75be-45fc-ae56-dbfd4cc2d61a.png">
  <link rel="icon" type="image/png" href="/assets/4c559800-6c1a-4664-af5f-c1209f299569.png">
  <link rel="apple-touch-icon" type="image/png" href="/assets/4c559800-6c1a-4664-af5f-c1209f299569.png">
  <style>
    :root {
      --ink: #223a70;
      --text: #1f2f55;
      --muted: #8d98ad;
      --line: #e8edf4;
      --paper: #ffffff;
      --bg: #ffffff;
      --accent: #223a70;
      --accent-hover: #1b2f5a;
      --ok-bg: #f4faf5;
      --ok-line: #d7e7d9;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 88px 24px 120px;
    }

    .hero {
      display: grid;
      justify-items: center;
      gap: 18px;
      margin-bottom: 76px;
    }

    .hero img {
      display: block;
      width: min(100%, 320px);
      height: auto;
    }

    .hero p {
      margin: 0;
      color: var(--ink);
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .contact {
      width: min(100%, 620px);
      margin: 0 auto;
    }

    .notice {
      display: none;
      margin: 0 0 18px;
      padding: 13px 16px;
      border: 1px solid var(--ok-line);
      border-radius: 4px;
      background: var(--ok-bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
    }

    .notice.is-visible {
      display: block;
    }

    form {
      margin: 0;
    }

    .field {
      margin: 0 0 20px;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
    }

    .required {
      color: #f23a3c;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--paper);
      color: #333333;
      box-shadow: none;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input {
      height: 50px;
      padding: 10px 16px;
    }

    textarea {
      min-height: 160px;
      padding: 10px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: #cccccc;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(34, 58, 112, 0.35);
      box-shadow: 0 0 0 3px rgba(34, 58, 112, 0.08);
    }

    .actions {
      margin-top: 20px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 4px;
      background: var(--accent);
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    .hp {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .page {
        padding: 56px 20px 84px;
      }

      .hero {
        gap: 14px;
        margin-bottom: 52px;
      }

      .hero img {
        width: min(100%, 240px);
      }

      button {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="RITO LLC">
      <img src="/assets/rito-logo.png" alt="リト">
      <p>RITO LLC</p>
    </section>

    <section class="contact" aria-label="お問い合わせフォーム">
      <p class="notice" id="contact-success">送信が完了しました。内容を確認のうえ返信します。</p>

      <form action="https://formsubmit.co/ritolab8@gmail.com" method="POST" accept-charset="UTF-8">
        <input type="hidden" name="_subject" value="リト｜八丈島の。お問い合わせ">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="https://hachijojima.github.io/?contact=sent">
        <input class="hp" type="text" name="_honey" tabindex="-1" autocomplete="off">

        <div class="field">
          <label for="name" class="field-label">お名前 <span class="required">*</span></label>
          <input id="name" name="name" type="text" placeholder="Your Name" autocomplete="name" required>
        </div>

        <div class="field">
          <label for="email" class="field-label">Email <span class="required">*</span></label>
          <input id="email" name="email" type="email" placeholder="Email Address" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="message" class="field-label">メッセージ <span class="required">*</span></label>
          <textarea id="message" name="message" placeholder="Put message here" required></textarea>
        </div>

        <div class="actions">
          <button type="submit">Send</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      if (params.get("contact") !== "sent") return;
      var notice = document.getElementById("contact-success");
      if (notice) notice.classList.add("is-visible");
      params.delete("contact");
      var next = window.location.pathname + (params.toString() ? "?" + params.toString() : "") + window.location.hash;
      window.history.replaceState({}, "", next);
    })();
  </script>
</body>
</html>
